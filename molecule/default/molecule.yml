---
dependency:
  name: galaxy
driver:
  name: docker
lint: |
  set -e
#  yamllint .
#  ansible-lint
platforms:
  - name: postgresql-17
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-debian11}-ansible:latest"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    command: ${MOLECULE_DOCKER_COMMAND:-""}
  - name: postgresql-18
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-debian11}-ansible:latest"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    command: ${MOLECULE_DOCKER_COMMAND:-""}
provisioner:
  name: ansible
  config_options:
    defaults:
      remote_tmp: /tmp/.ansible-${USER}/tmp/
  playbooks:
    prepare:  ${MOLECULE_PLAYBOOK:-../../tests/prepare.yml}
    converge: ${MOLECULE_PLAYBOOK:-../../tests/playbook.yml}
  inventory:
    host_vars:
      postgresql-17:
        postgresql_version: 17
      postgresql-18:
        postgresql_version: 18
verifier:
  name: ansible
