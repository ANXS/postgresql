# file: postgresql/tasks/users_privileges.yml

- name: PostgreSQL | Update users
  postgresql_user:
    name: "{{item.name}}"
    login_db: "{{item.db | default(omit)}}"
    port: "{{ postgresql_port }}"
    state: present
    login_host: "{{item.host | default(omit)}}"
    login_user: "{{postgresql_admin_user}}"
    role_attr_flags: "{{item.role_attr_flags | default(omit)}}"
  become: yes
  become_user: "{{postgresql_admin_user}}"
  with_items: "{{postgresql_user_privileges}}"
  when: postgresql_users|length > 0

- name: PostgreSQL | Grant privileges on databases/tables
  postgresql_privs:
    database: "{{item.db}}"
    type: "{{item.priv_type}}"
    privs: "{{item.priv | default(omit)}}"
    roles: "{{item.name}}"
    objs: "{{item.objs | default(omit)}}"
    state: present
    login_host: "{{item.host | default(omit)}}"
    login_user: "{{postgresql_admin_user}}"
    port: "{{postgresql_port}}"
  become: yes
  become_user: "{{postgresql_admin_user}}"
  with_items: "{{postgresql_user_privileges}}"
  when: postgresql_users|length > 0 and item.type is defined